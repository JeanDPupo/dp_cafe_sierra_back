services:
  - type: web
    name: cafedirecto-backend
    env: java
    plan: free
    rootDir: .
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/cowork-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        fromDatabase:
          name: cafedirecto-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: cafedirecto-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cafedirecto-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: FRONTEND_URL
        sync: false
      - key: DDL_AUTO
        value: update
      - key: SHOW_SQL
        value: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false

databases:
  - name: cafedirecto-db
    plan: free
    ipAllowList: []
