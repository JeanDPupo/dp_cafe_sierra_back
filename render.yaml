services:
  - type: web
    name: dp-cafe-sierra-back
    env: java
    plan: free
    rootDir: .
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/cowork-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: FRONTEND_URL
        sync: false
      - key: DDL_AUTO
        value: update
      - key: SHOW_SQL
        value: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
