spring.datasource.url=jdbc:h2:mem:cafedirecto;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

app.jwt.secret=local-dev-secret-key-local-dev-secret-key
app.jwt.expiration-ms=86400000
app.frontend-url=http://localhost:3000
app.payment.mercadopago.access-token=test-token
app.payment.mercadopago.webhook-secret=test-webhook-secret
